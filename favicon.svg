<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="masGrad" x1="12" y1="12" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="masGrad2" x1="50" y1="20" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00d4ff"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Squircle tile -->
  <rect x="3" y="3" width="94" height="94" rx="26" fill="#0a0e1a"/>
  <rect x="3.75" y="3.75" width="92.5" height="92.5" rx="25.25" stroke="url(#masGrad)" stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- Abstract geometric M — twin ascending peaks (M) framing a central A-peak -->
  <path d="M24 73 V34 L42 56" stroke="url(#masGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M76 73 V34 L58 56" stroke="url(#masGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Central A-peak (abstract) -->
  <path d="M42 56 L50 30 L58 56" stroke="url(#masGrad2)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S — abstract accent node (the spark / signature dot) -->
  <circle cx="50" cy="68" r="5" fill="url(#masGrad2)"/>
</svg>
